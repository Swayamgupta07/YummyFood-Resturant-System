<nav class="navbar">
  <div class="container nav-inner">
    <a routerLink="/home" class="nav-brand">
      <span class="brand-icon">🍽️</span>
      <span class="brand-name">YumFood</span>
    </a>

    <div class="nav-links">
      <a routerLink="/home" routerLinkActive="active" class="nav-link">Menu</a>
      @if (isAdmin) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">🤴 Admin</a>
      }
    </div>

    <div class="nav-actions">
      <a routerLink="/cart" class="cart-btn">
        <span class="cart-icon">🛒</span>
        @if (cartCount() > 0) {
          <span class="cart-badge">{{ cartCount() }}</span>
        }
      </a>

      @if (authService.isLoggedIn()) {
        <div class="user-menu" (click)="toggleDropdown($event)">
          <span class="user-name"> {{ currentUser?.name }}</span>
          <div class="user-dropdown" [class.show]="isDropdownOpen">
            <a routerLink="/order-history" class="dropdown-item">My Orders</a>
            <button (click)="logout()" class="dropdown-item logout-btn">Logout</button>
          </div>
        </div>
      } @else {
        <a routerLink="/login" class="btn-outline">Login</a>
        <a routerLink="/register" class="btn-primary">Sign Up</a>
      }
    </div>
  </div>
</nav>
